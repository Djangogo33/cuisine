<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Mon Carnet de Recettes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥘</text></svg>">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full font-body" style="background:#1a1410;">
    <div id="selector-view" class="p-8 overflow-auto h-full">
        <h1 class="font-heading text-5xl text-center mb-8 text-[#f5e6d3]">Mes Recettes</h1>
        <div id="recipes-grid" class="max-w-4xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="list-view" class="hidden p-8 overflow-auto h-full">
        <div class="max-w-2xl mx-auto">
            <button onclick="backToRecipes()" class="text-[#e85720] mb-6 flex items-center gap-2 font-bold hover:underline">
                <i data-lucide="arrow-left"></i> Retour
            </button>
            <h2 id="recipe-title" class="font-heading text-4xl text-[#f5e6d3] mb-8"></h2>
            <div id="ingredients-container" class="space-y-4"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

let currentRecipeId = null;
let servings = 4;
let checked = new Set();

function scale(qty) {
  const recipe = recipes.find(r => r.id === currentRecipeId);
  if (!recipe) return qty;
  const baseServings = recipe.baseServings;
  const v = (qty / baseServings) * servings;
  return v % 1 === 0 ? v : v.toFixed(1);
}

function selectRecipe(recipeId) {
  currentRecipeId = recipeId;
  const recipe = recipes.find(r => r.id === recipeId);
  if (!recipe) return;
  
  servings = recipe.baseServings;
  checked.clear();
  
  document.getElementById('selector-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('recipe-title').textContent = recipe.name;
  document.getElementById('servings-num').textContent = servings;
  document.getElementById('servings-label').textContent = `${servings} personne${servings > 1 ? 's' : ''}`;
  
  renderIngredients();
  lucide.createIcons();
}

function backToRecipes() {
  currentRecipeId = null;
  document.getElementById('selector-view').style.display = 'block';
  document.getElementById('list-view').style.display = 'none';
  renderRecipes();
  lucide.createIcons();
}

function renderRecipes() {
  const grid = document.getElementById('recipes-grid');
  grid.innerHTML = '';
  recipes.forEach((recipe, idx) => {
    const card = document.createElement('div');
    card.className = 'recipe-card p-5 rounded-2xl fade-in';
    card.style.cssText = `background:#251e17; animation-delay:${idx * 0.02}s;`;
    card.innerHTML = `
      <div class="font-heading text-xl" style="color:#f5e6d3;">${recipe.name}</div>
      <p class="text-xs mt-2" style="color:#a08872;">👥 ${recipe.baseServings} portions</p>
    `;
    card.onclick = () => selectRecipe(recipe.id);
    grid.appendChild(card);
  });
}

function toggleItem(key) {
  checked.has(key) ? checked.delete(key) : checked.add(key);
  updateItemElement(key);
  updateSummary();
}

function changeServings(d) {
  servings = Math.max(1, Math.min(20, servings + d));
  document.getElementById('servings-num').textContent = servings;
  document.getElementById('servings-label').textContent = `${servings} personne${servings > 1 ? 's' : ''}`;
  renderIngredients();
}

function updateItemElement(key) {
  const el = document.getElementById(`item-${key}`);
  if (!el) return;
  const isChecked = checked.has(key);
  el.classList.toggle('checked-row', isChecked);
  el.querySelector('div').style.borderColor = isChecked ? '#e85720' : '#3d3026';
  el.querySelector('div').style.background = isChecked ? '#e85720' : 'transparent';
  const icon = el.querySelector('[data-lucide="check"]');
  if (isChecked && !icon) {
    el.querySelector('div').innerHTML = '<i data-lucide="check" style="width:14px;height:14px;color:#fff;"></i>';
    lucide.createIcons();
  } else if (!isChecked) {
    el.querySelector('div').innerHTML = '';
  }
}

function updateSummary() {
  const recipe = recipes.find(r => r.id === currentRecipeId);
  if (!recipe) return;
  let totalItems = 0, checkedItems = 0;
  recipe.categories.forEach(cat => {
    cat.items.forEach(() => totalItems++);
  });
  checkedItems = checked.size;
  document.getElementById('summary').textContent = `${checkedItems}/${totalItems} ingrédients cochés`;
}

function renderIngredients() {
  const recipe = recipes.find(r => r.id === currentRecipeId);
  if (!recipe) return;
  
  const container = document.getElementById('ingredients-container');
  container.innerHTML = '';

  recipe.categories.forEach((cat, ci) => {
    const catEl = document.createElement('div');
    catEl.className = 'mb-4 rounded-2xl overflow-hidden fade-in';
    catEl.style.cssText = `background:#251e17; animation-delay:${0.08 + ci * 0.04}s;`;
    
    const header = document.createElement('div');
    header.className = 'px-5 pt-4 pb-2';
    header.innerHTML = `<p class="font-bold text-sm tracking-wide" style="color:#a08872;">${cat.name}</p>`;
    catEl.appendChild(header);
    
    const itemsContainer = document.createElement('div');
    cat.items.forEach((item, ii) => {
      const key = `${ci}-${ii}`;
      const isChecked = checked.has(key);

      const row = document.createElement('div');
      row.id = `item-${key}`;
      row.className = `ingredient-row flex items-center gap-3 px-5 py-3 ${isChecked ? 'checked-row' : ''}`;
      row.onclick = () => toggleItem(key);
      row.innerHTML = `
        <div class="w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0" style="border-color:${isChecked ? '#e85720' : '#3d3026'}; background:${isChecked ? '#e85720' : 'transparent'};">
          ${isChecked ? '<i data-lucide="check" style="width:14px;height:14px;color:#fff;"></i>' : ''}
        </div>
        <span class="flex-1" style="color:#f5e6d3;">${item.name}</span>
        <span class="font-bold text-sm tabular-nums" style="color:#e85720;">${scale(item.qty)} ${item.unit}</span>`;
      itemsContainer.appendChild(row);
    });
    
    catEl.appendChild(itemsContainer);
    container.appendChild(catEl);
  });

  updateSummary();
  lucide.createIcons();
}

const defaultConfig = {
  main_title: "Mes Recettes",
  subtitle_text: "Carnet de recettes",
  background_color: "#1a1410",
  surface_color: "#251e17",
  text_color: "#f5e6d3",
  accent_color: "#e85720",
  muted_color: "#a08872",

  defaultConfig,
  onConfigChange: async (config) => {
    const c = { ...defaultConfig, ...config };
    document.getElementById('title').textContent = c.main_title;
    document.getElementById('subtitle').textContent = c.subtitle_text;
    document.getElementById('app').style.background = c.background_color;
    document.getElementById('title').style.color = c.text_color;
    document.getElementById('title').style.fontFamily = `${c.font_family}, serif`;
    document.getElementById('title').style.fontSize = `${c.font_size * 3.125}px`;
  },
  mapToCapabilities: (config) => {
    const c = { ...defaultConfig, ...config };
    const mut = (key) => ({
      get: () => c[key],
      set: (v) => { c[key] = v; window.elementSdk.setConfig({ [key]: v }); }
    });
    return {
      recolorables: [mut('background_color'), mut('surface_color'), mut('text_color'), mut('accent_color'), mut('muted_color')],
      borderables: [],
      fontEditable: mut('font_family'),
      fontSizeable: mut('font_size')
    };
  },
  mapToEditPanelValues: (config) => {
    const c = { ...defaultConfig, ...config };
    return new Map([
      ["main_title", c.main_title],
      ["subtitle_text", c.subtitle_text]
    ]);
  }
});

renderRecipes();

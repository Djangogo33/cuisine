<!doctype html>
<html lang="fr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Carnet de Recettes</title>
  
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;family=Nunito:wght@400;600;700&amp;display=swap" rel="stylesheet">
  
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

  <link rel="stylesheet" href="style.css">
 </head>
 <body class="h-full font-body">
  <div id="app" class="h-full w-full overflow-auto flex flex-col" style="background:#1a1410;">
   
   <div id="selector-view" class="w-full flex-1 overflow-auto">
    <div class="max-w-2xl mx-auto px-4 py-8">
     <div class="text-center mb-8 fade-in">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full mb-4" style="background:#e8572055; color:#e85720;">
          <span class="text-lg">📚</span> 
          <span class="text-sm font-bold tracking-wide uppercase" id="subtitle">Carnet de recettes</span>
      </div>
      <h1 id="title" class="font-heading text-5xl mb-2" style="color:#f5e6d3;">Mes Recettes</h1>
     </div>
     <div id="recipes-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
   </div>

   <div id="list-view" class="w-full flex-1 overflow-auto" style="display:none;">
    <div class="max-w-2xl mx-auto px-4 py-8">
     <div class="flex items-center gap-3 mb-6 fade-in">
      <button onclick="backToRecipes()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#251e17; color:#e85720;"> 
          <i data-lucide="arrow-left" style="width:20px;height:20px;"></i> 
      </button>
      <div class="flex-1">
       <p class="text-sm font-semibold" style="color:#a08872;">Liste de courses</p>
       <h2 id="recipe-title" class="font-heading text-3xl" style="color:#f5e6d3;"></h2>
      </div>
     </div>

     <div class="rounded-2xl p-5 mb-6 fade-in" style="background:#251e17; animation-delay:0.08s;">
      <div class="flex items-center justify-between">
       <div>
        <p class="text-sm font-semibold" style="color:#a08872;">Portions</p>
        <p id="servings-label" class="font-heading text-2xl" style="color:#f5e6d3;">4 personnes</p>
       </div>
       <div class="flex items-center gap-3">
           <button onclick="changeServings(-1)" class="btn-serving w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg" style="background:#e8572033; color:#e85720;">−</button> 
           <span id="servings-num" class="font-heading text-3xl w-8 text-center" style="color:#f5e6d3;">4</span> 
           <button onclick="changeServings(1)" class="btn-serving w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg" style="background:#e8572033; color:#e85720;">+</button>
       </div>
      </div>
     </div>

     <div id="ingredients-container"></div>

     <div class="mt-6 text-center fade-in" style="animation-delay:0.4s;">
      <p id="summary" class="text-sm" style="color:#a08872;"></p>
     </div>
    </div>
   </div>
  </div>

  <script src="script.js"></script>
 </body>
</html>
